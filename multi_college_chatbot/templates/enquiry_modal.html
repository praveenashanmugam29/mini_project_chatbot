{#
  enquiry_modal.html
  ------------------
  Bootstrap modal. Opened from sidebar or buttons.
#}
<div class="modal fade" id="enquiryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content glass-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title">
          <i class="fa-solid fa-pen-to-square me-2"></i>Enquiry Form
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-0">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input id="enqName" class="form-control" type="text" placeholder="Your Name" value="{{ session.get('display_name','') }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Email (optional)</label>
            <input id="enqEmail" class="form-control" type="email" placeholder="example@gmail.com">
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone (optional)</label>
            <input id="enqPhone" class="form-control" type="text" placeholder="Mobile Number">
          </div>
          <div class="col-12">
            <label class="form-label">Your Message</label>
            <textarea id="enqMessage" class="form-control" rows="4" placeholder="Write your question / requirement…"></textarea>
          </div>
        </div>
        <div class="text-muted small mt-2">
          <i class="fa-solid fa-circle-info me-1"></i> Enquiries are stored in MySQL (enquiries table).
        </div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary btn-glow" id="btnSubmitEnquiry">
          Submit <i class="fa-solid fa-arrow-right ms-2"></i>
        </button>
      </div>
    </div>
  </div>
</div>
